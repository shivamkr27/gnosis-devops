grafana:
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true   # Persists manually-created dashboards across pod restarts
    size: 1Gi

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: gnosis
          orgId: 1
          folder: Gnosis
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/gnosis

  # Load gnosis-dashboard.json from monitoring/grafana/ via a ConfigMap.
  # Apply before Helm install:
  #   kubectl create configmap gnosis-grafana-dashboards \
  #     --from-file=gnosis-dashboard.json=monitoring/grafana/gnosis-dashboard.json \
  #     -n monitoring
  dashboardsConfigMaps:
    gnosis: gnosis-grafana-dashboards

prometheus:
  prometheusSpec:
    # 7d retention is intentional — OCI free-tier OKE has limited PVC storage (5Gi).
    # Production recommendation: 30d+ with remote_write to OCI Object Storage or Thanos.
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Gnosis-specific alert rules
    additionalScrapeConfigs:
      - job_name: gnosis-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [gnosis]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'slack'
    receivers:
      - name: 'slack'
        slack_configs:
          - api_url: 'YOUR_SLACK_WEBHOOK_URL'  # Replace with your Slack webhook
            channel: '#gnosis-alerts'
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# Custom alert rules for Gnosis
additionalPrometheusRulesMap:
  gnosis-rules:
    groups:
      - name: gnosis.alerts
        rules:
          - alert: GnosisPodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="gnosis"}[5m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              description: "Pod {{ $labels.pod }} is crash looping in gnosis namespace"

          - alert: GnosisHighCPU
            expr: rate(container_cpu_usage_seconds_total{namespace="gnosis"}[5m]) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              description: "Service {{ $labels.container }} CPU > 80%"

          - alert: GnosisHighMemory
            expr: container_memory_usage_bytes{namespace="gnosis"} / container_spec_memory_limit_bytes{namespace="gnosis"} > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              description: "Service {{ $labels.container }} memory > 85%"

          - alert: GnosisServiceDown
            expr: up{namespace="gnosis"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              description: "Gnosis service {{ $labels.job }} is down"

          - alert: GnosisDBConnectionHigh
            expr: pg_stat_activity_count{namespace="gnosis"} > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              description: "PostgreSQL connections > 80 in gnosis namespace"
