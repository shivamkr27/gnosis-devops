apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gnosis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/shivamkr27/gnosis-devops
    targetRevision: main
    path: gitops/k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: gnosis
  syncPolicy:
    automated:
      prune: true       # Delete removed resources
      selfHeal: true    # Auto-fix drift
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  # Ignore Secret data fields — real values are applied manually via kubectl,
  # not from this template. This prevents ArgoCD from overwriting live secrets
  # with placeholder values while still keeping the resource tracked (no prune).
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: gnosis-secrets
      namespace: gnosis
      jqPathExpressions:
        - '.data'
        - '.stringData'
