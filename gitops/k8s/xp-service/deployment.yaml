apiVersion: apps/v1
kind: Deployment
metadata:
  name: xp-service
  namespace: gnosis
  labels:
    app: xp-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xp-service
  template:
    metadata:
      labels:
        app: xp-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: xp-service
          image: ap-mumbai-1.ocir.io/bmr6dpc3ujz4/gnosis/xp-service:772b91d92b262590f6039f136eeb7772de05be8d
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: gnosis-secrets
            - configMapRef:
                name: gnosis-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 5
