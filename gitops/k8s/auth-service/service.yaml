apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: gnosis
  labels:
    app: auth-service
    project: gnosis
    monitoring: enabled
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
