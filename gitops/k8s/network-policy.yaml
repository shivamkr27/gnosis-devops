# Zero-trust network — only allow necessary traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gnosis-network-policy
  namespace: gnosis
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic within gnosis namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gnosis
    # Allow from monitoring namespace (Prometheus scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  egress:
    # Allow all egress (DNS, external APIs like Gemini)
    - {}
