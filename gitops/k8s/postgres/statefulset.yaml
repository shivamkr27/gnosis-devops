apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: gnosis
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      automountServiceAccountToken: false
      # securityContext omitted — postgres:15-alpine entrypoint uses su-exec to switch
      # to the internal postgres user (UID 70). Forcing a non-root UID without an init
      # container to chown the existing PVC data causes FATAL: wrong ownership.
      # TODO: add initContainer chown + runAsUser:70 after a scheduled maintenance window.
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: gnosis-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gnosis-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: gnosis
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-sql
          configMap:
            name: gnosis-init-sql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
