apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gnosis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ap-mumbai-1.ocir.io/bmr6dpc3ujz4/gnosis/frontend:723fa5639d033ba9c488257b348375ed1a6b08fd
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
