apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: gnosis
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3006"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: notification-service
          image: ap-mumbai-1.ocir.io/bmr6dpc3ujz4/gnosis/notification-service:6477b17b4da3e574feb128d0c52c095da5b31d8b
          ports:
            - containerPort: 3006
          envFrom:
            - secretRef:
                name: gnosis-secrets
            - configMapRef:
                name: gnosis-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 5
