name: Gnosis CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # OCI Container Registry — update after account setup
  REGISTRY: ap-mumbai-1.ocir.io
  TENANCY_NAMESPACE: ${{ secrets.OCI_TENANCY_NAMESPACE }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── SAST: SonarQube ──────────────────────────────────────────────────
  sast-scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  # ── OWASP npm audit ───────────────────────────────────────────────────
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: npm audit — all services
        run: |
          FAILED=0
          for svc in api-gateway auth-service content-service progress-service xp-service battle-service notification-service; do
            echo "── Auditing gnosis/$svc ──"
            cd gnosis/$svc
            npm audit --audit-level=high || FAILED=1
            cd ../..
          done
          exit $FAILED
        continue-on-error: true

  # ── IaC: Checkov ─────────────────────────────────────────────────────
  checkov-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          soft_fail: true

      - name: Checkov — K8s manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: gitops/k8s/
          framework: kubernetes
          soft_fail: true

  # ── Build + Trivy + Push ─────────────────────────────────────────────
  build-and-push:
    name: Build → Scan → Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: []
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - content-service
          - progress-service
          - xp-service
          - battle-service
          - notification-service
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Install Cosign for image signing
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: ./gnosis/${{ matrix.service }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy — scan for CRITICAL CVEs (report only, does not block)
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Trivy — Dockerfile misconfig scan (warn only)
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./gnosis/${{ matrix.service }}
          exit-code: "0"
          severity: HIGH,CRITICAL

      # SBOM — Software Bill of Materials
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

      # Login to OCIR — only on push to main
      - name: Login to OCIR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      # Push image
      - name: Push image to OCIR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./gnosis/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:latest
          cache-from: type=gha

      # Cosign — sign the pushed image (supply chain security)
      - name: Sign image with Cosign
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}

  # ── Update K8s manifests (GitOps) ───────────────────────────────────
  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in K8s manifests
        run: |
          NEW_TAG=${{ github.sha }}
          REGISTRY="${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}"

          for SERVICE in api-gateway auth-service content-service progress-service \
                         xp-service battle-service notification-service frontend; do
            MANIFEST="gitops/k8s/${SERVICE}/deployment.yaml"
            if [ -f "$MANIFEST" ]; then
              sed -i "s|${REGISTRY}/gnosis/${SERVICE}:.*|${REGISTRY}/gnosis/${SERVICE}:${NEW_TAG}|g" "$MANIFEST"
              echo "✅ Updated $MANIFEST → $NEW_TAG"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/k8s/
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push

  # ── Notify on failure ─────────────────────────────────────────────────
  notify-failure:
    name: Slack — notify on failure
    runs-on: ubuntu-latest
    needs: [sast-scan, owasp-check, checkov-scan, build-and-push, update-manifests]
    if: failure()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Gnosis CI failed* — ${{ github.ref_name }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
