name: Gnosis CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Security Scan ───────────────────────────────────────────────
  sast-scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true  # Don't block pipeline if SonarQube not configured yet

  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'gnosis'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
        continue-on-error: true

  # ─── Build + Trivy Scan + Push ───────────────────────────────────
  build-and-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: []  # Run in parallel with scans
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - content-service
          - progress-service
          - xp-service
          - battle-service
          - notification-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/gnosis/${{ matrix.service }}:$IMAGE_TAG \
            ./gnosis/${{ matrix.service }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Push Docker Image to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/gnosis/${{ matrix.service }}:$IMAGE_TAG

  # ─── IaC Security Scan ───────────────────────────────────────────
  checkov-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          soft_fail: true

  # ─── Update K8s Manifests ─────────────────────────────────────────
  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in K8s manifests
        run: |
          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          for SERVICE in api-gateway auth-service content-service progress-service xp-service battle-service notification-service frontend; do
            MANIFEST="gitops/k8s/${SERVICE}/deployment.yaml"
            if [ -f "$MANIFEST" ]; then
              sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/gnosis/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/gnosis/${SERVICE}:${NEW_TAG}|g" $MANIFEST
              echo "Updated $MANIFEST"
            fi
          done

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
