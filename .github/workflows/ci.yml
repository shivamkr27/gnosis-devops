name: Gnosis CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Build all services regardless of changes'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ap-mumbai-1.ocir.io
  TENANCY_NAMESPACE: ${{ secrets.OCI_TENANCY_NAMESPACE }}
  IMAGE_TAG: ${{ github.sha }}
  ALL_SERVICES: '["api-gateway","auth-service","content-service","progress-service","xp-service","battle-service","notification-service","frontend","kira"]'

jobs:
  # ── Step 1: Detect which services actually changed ─────────────────────
  # Uses dorny/paths-filter to diff changed files against filters.
  # Outputs a JSON array used as the matrix for build-and-push.
  # gnosis/common/** change triggers ALL services (shared lib).
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix:        ${{ steps.set-matrix.outputs.matrix }}
      has-changes:   ${{ steps.set-matrix.outputs.has-changes }}
      infra-changed: ${{ steps.filter.outputs.infra }}
      code-changed:  ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for accurate diff on push events

      - name: Filter changed paths per service
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway:
              - 'gnosis/api-gateway/**'
              - 'gnosis/common/**'
            auth-service:
              - 'gnosis/auth-service/**'
              - 'gnosis/common/**'
            content-service:
              - 'gnosis/content-service/**'
              - 'gnosis/common/**'
            progress-service:
              - 'gnosis/progress-service/**'
              - 'gnosis/common/**'
            xp-service:
              - 'gnosis/xp-service/**'
              - 'gnosis/common/**'
            battle-service:
              - 'gnosis/battle-service/**'
              - 'gnosis/common/**'
            notification-service:
              - 'gnosis/notification-service/**'
              - 'gnosis/common/**'
            frontend:
              - 'gnosis/frontend/**'
            kira:
              - 'gnosis/kira/**'
            infra:
              - 'infrastructure/**'
              - 'gitops/**'
            code:
              - 'gnosis/**'

      - name: Build matrix from changed services
        id: set-matrix
        run: |
          # workflow_dispatch with force_all=true → rebuild everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force_all }}" = "true" ]; then
            MATRIX='${{ env.ALL_SERVICES }}'
          else
            # paths-filter outputs JSON array of matched filter names.
            # Remove meta-filters (infra, code) — they are not buildable services.
            MATRIX=$(echo '${{ steps.filter.outputs.changes }}' | \
              jq -c '[.[] | select(. != "infra" and . != "code")]')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "### Changed Services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.set-matrix.outputs.matrix }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── SAST: SonarQube — only when source code changed ───────────────────
  sast-scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.code-changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  # ── OWASP: audit only changed services ────────────────────────────────
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'gnosis/*/package-lock.json'

      - name: npm audit — changed services only
        run: |
          CHANGED='${{ needs.detect-changes.outputs.matrix }}'
          FAILED=0
          for svc in $(echo "$CHANGED" | jq -r '.[]'); do
            if [ -f "gnosis/$svc/package.json" ]; then
              echo "── Auditing gnosis/$svc ──"
              cd "gnosis/$svc"
              npm audit --audit-level=high || FAILED=1
              cd ../..
            fi
          done
          exit $FAILED
        continue-on-error: true

  # ── IaC: Checkov — only when infra/gitops changed ─────────────────────
  checkov-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra-changed == 'true' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          soft_fail: true

      - name: Checkov — K8s manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: gitops/k8s/
          framework: kubernetes
          soft_fail: true

  # ── Build + Trivy + Push — ONLY changed services ──────────────────────
  # Matrix is dynamically set from detect-changes output.
  # Each service has its own GHA cache scope to avoid eviction between services.
  build-and-push:
    name: Build → Scan → Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (with npm cache)
        if: matrix.service != 'kira'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'gnosis/${{ matrix.service }}/package-lock.json'

      - name: Set up QEMU (ARM cross-build support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Build amd64 only for Trivy scan (load:true = single platform only).
      # scope= isolates each service's cache so they don't evict each other.
      - name: Build image for scan (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./gnosis
          file: ./gnosis/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy — image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Trivy — Dockerfile misconfig scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./gnosis/${{ matrix.service }}
          exit-code: "0"
          severity: HIGH,CRITICAL

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

      - name: Login to OCIR
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      # Push multi-arch (amd64 + arm64 for OCI A1.Flex free tier).
      # cache-to here ensures ARM64 layers are cached for subsequent runs.
      - name: Push image to OCIR
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./gnosis
          file: ./gnosis/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Sign image with Cosign
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}/gnosis/${{ matrix.service }}:${{ env.IMAGE_TAG }}

  # ── Update K8s manifests — only changed services ──────────────────────
  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect-changes.outputs.has-changes == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags — changed services only
        run: |
          NEW_TAG=${{ github.sha }}
          REGISTRY="${{ env.REGISTRY }}/${{ env.TENANCY_NAMESPACE }}"
          CHANGED='${{ needs.detect-changes.outputs.matrix }}'

          for SERVICE in $(echo "$CHANGED" | jq -r '.[]'); do
            MANIFEST="gitops/k8s/${SERVICE}/deployment.yaml"
            if [ -f "$MANIFEST" ]; then
              sed -i "s|${REGISTRY}/gnosis/${SERVICE}:.*|${REGISTRY}/gnosis/${SERVICE}:${NEW_TAG}|g" "$MANIFEST"
              echo "✅ Updated $MANIFEST → $NEW_TAG"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/k8s/
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push

  # ── Notify on failure ─────────────────────────────────────────────────
  notify-failure:
    name: Slack — notify on failure
    runs-on: ubuntu-latest
    needs: [sast-scan, owasp-check, checkov-scan, build-and-push, update-manifests]
    if: failure()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Gnosis CI failed* — ${{ github.ref_name }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
