# ─── ansible/inventory/hosts.yml ─────────────────────────────────────
# Update with actual OCI node IPs after terraform apply.
# OCI free tier gives you 2 VM.Standard.A1.Flex nodes (ARM).
# ─────────────────────────────────────────────────────────────────────

all:
  children:
    k8s_nodes:
      hosts:
        node-1:
          ansible_host: 10.0.10.10       # Replace with actual OCI private IP
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/oci_key
        node-2:
          ansible_host: 10.0.10.11       # Replace with actual OCI private IP
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/oci_key

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
