---
# ─── ansible/roles/k8s-node/tasks/main.yml ──────────────────────────

# ── 1. System hardening ───────────────────────────────────────────────
- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
  notify: restart sshd

- name: Set up UFW firewall — allow only required ports
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"     # SSH
    - "80"     # HTTP
    - "443"    # HTTPS
    - "6443"   # K8s API server
    - "10250"  # kubelet
    - "9100"   # node_exporter

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Disable swap (K8s requirement)
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remove swap from fstab permanently
  lineinfile:
    path: /etc/fstab
    regexp: ".*swap.*"
    state: absent

# ── 2. Kernel params for K8s ─────────────────────────────────────────
- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Make kernel modules persistent
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set kernel params for K8s networking
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                 value: "1" }
    - { key: "vm.max_map_count",                    value: "262144" }  # for Elasticsearch/OpenSearch if needed
    - { key: "fs.file-max",                         value: "65536" }

# ── 3. Install containerd ─────────────────────────────────────────────
- name: Install containerd dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install containerd
  apt:
    name: containerd.io
    state: present
    update_cache: yes

- name: Configure containerd to use systemd cgroup driver
  copy:
    dest: /etc/containerd/config.toml
    content: |
      version = 2
      [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
        runtime_type = "io.containerd.runc.v2"
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
          SystemdCgroup = true
  notify: restart containerd

- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: yes
    state: started

# ── 4. Install kubectl ────────────────────────────────────────────────
- name: Download kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Verify kubectl
  command: kubectl version --client --short
  register: kubectl_check
  changed_when: false

# ── 5. Install Helm ───────────────────────────────────────────────────
- name: Download Helm install script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: "0755"

- name: Install Helm
  command: /tmp/get-helm.sh
  args:
    creates: /usr/local/bin/helm

- name: Add common Helm repos
  command: "helm repo add {{ item.name }} {{ item.url }}"
  loop:
    - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
    - { name: "falcosecurity",        url: "https://falcosecurity.github.io/charts" }
    - { name: "argo",                 url: "https://argoproj.github.io/argo-helm" }
    - { name: "ingress-nginx",        url: "https://kubernetes.github.io/ingress-nginx" }
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  changed_when: false

# ── 6. Install k9s (optional but useful) ─────────────────────────────
- name: Install k9s
  unarchive:
    src: "https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    include: k9s
    mode: "0755"

# ── 7. Install node_exporter for Prometheus ───────────────────────────
- name: Create node_exporter user
  user:
    name: node_exporter
    system: yes
    shell: /bin/false
    create_home: no

- name: Download node_exporter
  unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    owner: node_exporter
    remote_src: yes

- name: Create node_exporter systemd service
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter \
        --collector.systemd \
        --collector.processes \
        --web.listen-address=:9100
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

# ── 8. OCI CLI (for OKE cluster join) ───────────────────────────────
- name: Install OCI CLI
  shell: |
    curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh \
      | bash -s -- --accept-all-defaults
  args:
    creates: /root/bin/oci
  when: install_oci_cli | default(true)

- name: Add OCI CLI to PATH
  lineinfile:
    path: /etc/environment
    regexp: "^PATH="
    line: 'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/bin"'
